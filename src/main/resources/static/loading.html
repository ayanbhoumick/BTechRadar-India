<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading | BTech Radar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&display=swap">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #f5f5f5; }
        body { transition: opacity 0.7s ease; }
        body.fade-out { opacity: 0; }

        /* ── Stars background ─────────────────────────────────── */
        #stars-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at bottom, #e0e0e0 0%, #f5f5f5 100%);
            overflow: hidden;
            z-index: 0;
        }
        #stars-mover {
            position: absolute;
            inset: 0;
            will-change: transform;
        }
        .star-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 2000px;
        }
        .star-layer.l1 { animation: scrollStars 50s  linear infinite; }
        .star-layer.l2 { animation: scrollStars 100s linear infinite; }
        .star-layer.l3 { animation: scrollStars 150s linear infinite; }
        .star-dot {
            position: absolute;
            background: transparent;
            border-radius: 50%;
        }
        .star-dot.clone { top: 2000px; }

        @keyframes scrollStars {
            from { transform: translateY(0); }
            to   { transform: translateY(-2000px); }
        }

        /* ── Centered overlay ─────────────────────────────────── */
        #overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            font-family: 'Geist Mono', monospace;
        }

        /* ── Square loader ────────────────────────────────────── */
        .sq-loader {
            width: 96px;
            height: 96px;
            transform: rotate(45deg);
            position: relative;
        }
        .sq {
            position: absolute;
            top: 0; left: 0;
            width: 28px; height: 28px;
            margin: 2px;
            background: rgba(0,0,0,0.82);
            animation: squareAnim 10s ease-in-out infinite both;
        }
        .sq:nth-child(1) { animation-delay: -10s; }
        .sq:nth-child(2) { animation-delay: calc(-10s + 1.4286s); }
        .sq:nth-child(3) { animation-delay: calc(-10s + 2.8571s); }
        .sq:nth-child(4) { animation-delay: calc(-10s + 4.2857s); }
        .sq:nth-child(5) { animation-delay: calc(-10s + 5.7143s); }
        .sq:nth-child(6) { animation-delay: calc(-10s + 7.1429s); }
        .sq:nth-child(7) { animation-delay: calc(-10s + 8.5714s); }

        @keyframes squareAnim {
            0%     { left: 0;    top: 0;  }
            10.5%  { left: 0;    top: 0;  }
            12.5%  { left: 32px; top: 0;  }
            23%    { left: 32px; top: 0;  }
            25%    { left: 64px; top: 0;  }
            35.5%  { left: 64px; top: 0;  }
            37.5%  { left: 64px; top: 32px; }
            48%    { left: 64px; top: 32px; }
            50%    { left: 32px; top: 32px; }
            60.5%  { left: 32px; top: 32px; }
            62.5%  { left: 32px; top: 64px; }
            73%    { left: 32px; top: 64px; }
            75%    { left: 0;    top: 64px; }
            85.5%  { left: 0;    top: 64px; }
            87.5%  { left: 0;    top: 32px; }
            98%    { left: 0;    top: 32px; }
            100%   { left: 0;    top: 0;  }
        }

        .label {
            font-size: 0.7rem;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <!-- Stars background -->
    <div id="stars-bg">
        <div id="stars-mover">
            <div class="star-layer l1">
                <div class="star-dot" id="s1"  style="width:1px;height:1px;"></div>
                <div class="star-dot clone" id="s1b" style="width:1px;height:1px;"></div>
            </div>
            <div class="star-layer l2">
                <div class="star-dot" id="s2"  style="width:2px;height:2px;"></div>
                <div class="star-dot clone" id="s2b" style="width:2px;height:2px;"></div>
            </div>
            <div class="star-layer l3">
                <div class="star-dot" id="s3"  style="width:3px;height:3px;"></div>
                <div class="star-dot clone" id="s3b" style="width:3px;height:3px;"></div>
            </div>
        </div>
    </div>

    <!-- Square loader + UI -->
    <div id="overlay">
        <div class="sq-loader">
            <div class="sq"></div>
            <div class="sq"></div>
            <div class="sq"></div>
            <div class="sq"></div>
            <div class="sq"></div>
            <div class="sq"></div>
            <div class="sq"></div>
        </div>
        <p class="label">Initialising Radar</p>
    </div>

    <script>
    // ── Star generation ───────────────────────────────────────
    (function () {
        function generateStars(count, color) {
            const s = [];
            for (let i = 0; i < count; i++) {
                const x = Math.floor(Math.random() * 4000) - 2000;
                const y = Math.floor(Math.random() * 4000) - 2000;
                s.push(`${x}px ${y}px ${color}`);
            }
            return s.join(',');
        }

        const layers = [
            { ids: ['s1','s1b'],  count: 1000, color: 'rgba(0,0,0,0.18)' },
            { ids: ['s2','s2b'],  count:  400, color: 'rgba(0,0,0,0.22)' },
            { ids: ['s3','s3b'],  count:  200, color: 'rgba(0,0,0,0.28)' },
        ];

        layers.forEach(({ ids, count, color }) => {
            const shadow = generateStars(count, color);
            ids.forEach(id => document.getElementById(id).style.boxShadow = shadow);
        });
    })();

    // ── Mouse parallax (spring) ───────────────────────────────
    (function () {
        const mover = document.getElementById('stars-mover');
        let tx = 0, ty = 0, cx = 0, cy = 0;
        const FACTOR = 0.05;

        window.addEventListener('mousemove', e => {
            tx = -(e.clientX - window.innerWidth  / 2) * FACTOR;
            ty = -(e.clientY - window.innerHeight / 2) * FACTOR;
        });

        (function spring() {
            cx += (tx - cx) * 0.06;
            cy += (ty - cy) * 0.06;
            mover.style.transform = `translate(${cx}px,${cy}px)`;
            requestAnimationFrame(spring);
        })();
    })();

    // ── Redirect after 5s ────────────────────────────────────
    setTimeout(() => {
        document.body.classList.add('fade-out');
        setTimeout(() => window.location.href = '/radar.html', 700);
    }, 5000);
    </script>
</body>
</html>
